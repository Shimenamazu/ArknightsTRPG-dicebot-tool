<!doctype html>

<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>アークナイツTRPGダイスBOT_成否チェッカー</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>

  <body>
    <main>
      <h1>アークナイツTRPGダイスBOT_成否チェッカー</h1>
      <div id="drop-area">
        CCFOLIAのログ(html)<br />
        クリックまたはドラッグ
        <input type="file" id="file-input" hidden />
      </div>

      <div>
        <span id="selected-file" class="hidden"></span>
        <button id="change-button" class="hidden">変更</button>
      </div>

      <div style="display: flex">
        <section id="l-panel" style="min-width: 10%">
          <button id="start-button" class="hidden">集計する</button>
          <div>
            <div>チャンネル</div>
            <div id="channel-list"></div>
          </div>
        </section>
        <section id="r-panel">
          <!--集計-->
          <div id="checker-area" class="hidden"></div>
        </section>
      </div>
    </main>

    <script src="src/main.js" defer></script>

    <style>
      #drop-area {
        width: 300px;
        height: 150px;
        border: 2px dashed #666;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        cursor: pointer;
      }

      #checker-area {
        white-space: pre-wrap;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </body>
</html>
