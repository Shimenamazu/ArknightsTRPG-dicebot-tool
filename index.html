<!doctype html>

<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>アークナイツTRPGダイスBOT_成否チェッカー</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>

  <body>
    <main>
      <h1>アークナイツTRPGダイスBOT_成否チェッカー</h1>
      <div id="drop-area">
        CCFOLIAのログ(html)<br />
        クリックまたはドラッグ
        <input type="file" id="file-input" hidden />
      </div>

      <div>
        <span id="selected-file" class="hidden"></span>
        <button id="change-button" class="hidden">変更</button>
      </div>

      <div id="overall-p" style="display: flex" class="hidden">
        <section id="l-panel" style="min-width: 10%">
          <div>
            <div>オプション</div>
            <div id="option-list" style="display: flex; flex-direction: column">
              <label
                ><input
                  type="checkbox"
                  class="option-btn"
                  id="p-cri"
                />ピッタリクリティカルを考慮する</label
              ><label
                ><input
                  type="checkbox"
                  class="option-btn"
                  id="g-dice"
                />汎用ダイスも集計する</label
              >
            </div>
          </div>
          <div>
            <div>集計するチャンネル</div>
            <div
              id="channel-list"
              style="display: flex; flex-direction: column"
            ></div>
          </div>
          <button id="start-button">集計する</button>
          <div>
            <div>表示するキャラクター</div>
            <div id="chara-list"></div>
          </div>
        </section>
        <section id="r-panel">
          <!--集計-->
          <div id="pre-checker-area">
            <span class="rp-1" onclick="setSort('name')"
              >キャラクター(<span class="sort" id="s-1">-</span>)</span
            >
            <span class="rp-2" onclick="setSort('roll')"
              >総ロール回数(<span class="sort" id="s-2">-</span>)</span
            >
            <span class="rp-3" onclick="setSort('cri')"
              >クリティカル回数(<span class="sort" id="s-3">-</span>)</span
            >
            <span class="rp-4" onclick="setSort('suc')"
              >成功回数(<span class="sort" id="s-4">-</span>)</span
            >
            <span class="rp-5" onclick="setSort('fail')"
              >失敗回数(<span class="sort" id="s-5">-</span>)</span
            >
            <span class="rp-6" onclick="setSort('err')"
              >エラー回数(<span class="sort" id="s-6">-</span>)</span
            >
          </div>
          <div id="checker-area"></div>
        </section>
      </div>
    </main>

    <script src="src/main.js" defer></script>

    <style>
      #drop-area {
        width: 300px;
        height: 150px;
        border: 2px dashed #666;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        cursor: pointer;
      }

      .channel-panel {
        display: flex;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </body>
</html>
